<!doctype html>
<html>
  <head>
    <style>
      .image-box {
        position: relative;
        width: 300px;
        display: inline-block;
      }

      .image-box img {
        width: 100%;
        border-radius: 16px;
        display: block;
      }

      .badge {
        position: absolute;
        background: #ef4444;
        color: white;
        padding: 6px 12px;
        border-radius: 40px;
        font-size: 12px;
        font-weight: bold;
      }

      /* تحريك الـ span في أي مكان جوة الصورة */
      .badge-top-right {
        top: 12px;
        right: 12px;
      }

      .badge-top-left {
        top: 12px;
        left: 12px;
      }

      .badge-bottom {
        bottom: 12px;
        left: 12px;
        right: 12px;
        text-align: center;
      }

      .badge-center {
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
    </style>
  </head>
  <body>
    <div class="image-box">
      <img src="https://picsum.photos/300/200" alt="sample" />
      <span class="badge badge-top-right">⭐ HOT</span>
    </div>

    <div class="image-box">
      <img src="https://picsum.photos/300/200" alt="sample" />
      <span class="badge badge-center">🔥 50% OFF</span>
    </div>
  </body>
</html>
